---
# rocket-launch — master playbook (Phase 1 provisioning).
#
# Data flow:
#   engine   : lib/package-map.yml  (logical app -> per-OS manager/id)
#   config   : machines.yml, profiles/*.yml, apps.yml  (what to install where)
#
# Invoked by `rocket provision` with:
#   rl_config_home, rl_context, rl_hostname

- name: rocket-launch provisioning
  hosts: localhost
  gather_facts: true

  vars:
    rl_engine_home: "{{ playbook_dir | dirname }}"
    rl_os: >-
      {{ 'macos' if ansible_facts.system == 'Darwin'
         else ('linux' if ansible_facts.system == 'Linux' else 'unknown') }}

  pre_tasks:
    - name: Load package map (engine)
      ansible.builtin.include_vars:
        file: "{{ rl_engine_home }}/lib/package-map.yml"
        name: package_map

    - name: Load machine definitions (config)
      ansible.builtin.include_vars:
        file: "{{ rl_config_home }}/machines.yml"

    - name: Resolve profiles for this host
      ansible.builtin.set_fact:
        host_profiles: >-
          {{ machines[rl_hostname].profiles
             | default(defaults.profiles | default(['base'])) }}

    - name: Accumulate logical packages from all selected profiles
      ansible.builtin.set_fact:
        selected_packages: >-
          {{ (selected_packages | default([])) +
             ((lookup('file', rl_config_home ~ '/profiles/' ~ item ~ '.yml')
               | from_yaml).packages | default([])) }}
      loop: "{{ host_profiles }}"

    - name: Deduplicate package list
      ansible.builtin.set_fact:
        selected_packages: "{{ selected_packages | default([]) | unique }}"

    - name: Accumulate macos_defaults from all selected profiles
      ansible.builtin.set_fact:
        selected_macos_defaults: >-
          {{ (selected_macos_defaults | default([])) +
             ((lookup('file', rl_config_home ~ '/profiles/' ~ item ~ '.yml')
               | from_yaml).macos_defaults | default([])) }}
      loop: "{{ host_profiles }}"

    # Deduplicate macos_defaults: build dict keyed by domain/key, last wins.
    - name: Deduplicate macos_defaults (by domain+key, last wins)
      ansible.builtin.set_fact:
        selected_macos_defaults: >-
          {{ dict(selected_macos_defaults | default([])
                  | map(attribute='domain')
                  | zip(selected_macos_defaults | default([])
                        | map(attribute='key'))
                  | map('join', '/')
                  | zip(selected_macos_defaults | default([])))
             | dict2items
             | map(attribute='value')
             | list }}

    # Convention: the 1Password item is named after the hostname, so the ref is
    # derived automatically as op://Private/<hostname>/config. A per-host
    # `wireguard_op_ref` in machines.yml overrides this (different vault/item).
    - name: Resolve wireguard_op_ref for this host
      ansible.builtin.set_fact:
        wireguard_op_ref: >-
          {{ machines[rl_hostname].wireguard_op_ref
             | default('op://Private/' ~ rl_hostname ~ '/config') }}

    # Syncthing Synology device ID reference. Default is the standard private vault
    # item; per-host override in machines.yml possible.
    - name: Resolve syncthing_synology_op_ref for this host
      ansible.builtin.set_fact:
        syncthing_synology_op_ref: >-
          {{ machines[rl_hostname].syncthing_synology_op_ref
             | default('op://Private/Syncthing-Synology/device-id') }}

    - name: Show resolution summary
      ansible.builtin.debug:
        msg:
          - "host       : {{ rl_hostname }}"
          - "context    : {{ rl_context }}  (os={{ rl_os }})"
          - "profiles   : {{ host_profiles }}"
          - "packages   : {{ selected_packages }}"
          - "macos_defaults: {{ selected_macos_defaults | length }} entries"
          - "wireguard_op_ref: {{ wireguard_op_ref | default('(none)') }}"
          - "syncthing_synology_op_ref: {{ syncthing_synology_op_ref | default('(none)') }}"

  roles:
    - role: packages       # install resolved apps via the right OS manager
    - role: fonts          # Nerd Fonts for terminals, editors, p10k
      when: "'personal' in host_profiles"
    - role: shell          # zsh + oh-my-zsh + p10k (fonts via fonts role)
    - role: onepassword    # 1Password CLI (op) — needed by chezmoi for op://
    - role: chezmoi        # dotfiles + secrets via chezmoi
    - role: macos-defaults # macOS system defaults (Dock, Finder, keyboard, etc.)
      vars:
        macos_defaults: "{{ selected_macos_defaults | default([]) }}"
      when: rl_os == 'macos'
    - role: docker-ce      # Docker CE from official repo (Linux/WSL/Fedora only)
      when: "rl_context in ['fedora', 'linux', 'wsl'] and 'docker' in selected_packages"
    - role: wireguard      # WireGuard VPN for mobile devices (laptops)
      when: "'laptop' in host_profiles"
    - role: ddev           # DDEV local dev environment (requires Docker)
      when: "'dev' in host_profiles and (ddev_install | default(true) | bool)"
    - role: syncthing      # Syncthing for ~/Sync <-> Synology sync
      vars:
        syncthing_synology_op_ref: "{{ syncthing_synology_op_ref }}"
      when: "'personal' in host_profiles"
    - role: default-mail   # Set default mail client via duti (macOS only)
      when: "rl_os == 'macos' and 'spark' in selected_packages"
