---
# Install the 1Password CLI (`op`) and optionally the desktop GUI.
# CLI is used by chezmoi to resolve op:// secret references at apply time.
# GUI follows the "screen" (macOS/Fedora/Linux-Desktop); WSL is excluded because
# the GUI runs on the Windows host (via winget, see windows-host.txt).

- name: Install & configure 1Password CLI
  when: onepassword_install_cli | bool
  block:
    # --- macOS ---
    - name: Install 1Password CLI (macOS)
      community.general.homebrew_cask:
        name: 1password-cli
        state: present
      when: rl_os == 'macos'

    # --- Debian/Ubuntu/WSL ---
    - name: Compute apt architecture
      ansible.builtin.set_fact:
        op_apt_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
      when: rl_context in ['wsl', 'linux']

    - name: Add 1Password signing key (apt)
      ansible.builtin.get_url:
        url: "{{ onepassword_key_url }}"
        dest: /usr/share/keyrings/1password-archive-keyring.asc
        mode: "0644"
      become: true
      when: rl_context in ['wsl', 'linux']

    - name: Add 1Password apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ op_apt_arch }} signed-by=/usr/share/keyrings/1password-archive-keyring.asc] https://downloads.1password.com/linux/debian/{{ op_apt_arch }} stable main"
        filename: 1password
        state: present
      become: true
      when: rl_context in ['wsl', 'linux']

    - name: Install 1Password CLI (apt)
      ansible.builtin.apt:
        name: 1password-cli
        state: present
        update_cache: true
      become: true
      when: rl_context in ['wsl', 'linux']

    # --- Fedora ---
    - name: Import 1Password rpm key (Fedora)
      ansible.builtin.rpm_key:
        key: "{{ onepassword_key_url }}"
        state: present
      become: true
      when: rl_context == 'fedora'

    - name: Add 1Password dnf repository (Fedora)
      ansible.builtin.yum_repository:
        name: 1password
        description: 1Password Stable Channel
        baseurl: https://downloads.1password.com/linux/rpm/stable/$basearch
        enabled: true
        gpgcheck: true
        repo_gpgcheck: true
        gpgkey: "{{ onepassword_key_url }}"
      become: true
      when: rl_context == 'fedora'

    - name: Install 1Password CLI (dnf)
      ansible.builtin.dnf:
        name: 1password-cli
        state: present
      become: true
      when: rl_context == 'fedora'

# --- GUI Installation (where a desktop is present) ---
# WSL is intentionally excluded: the GUI runs on the Windows host (via winget,
# see windows-host.txt). CLI in WSL integrates with the Windows app.

- name: Install 1Password GUI
  when: onepassword_install_gui | bool
  block:
    - name: Install 1Password GUI (macOS)
      community.general.homebrew_cask:
        name: 1password
        state: present
      when: rl_os == 'macos'

    - name: Install 1Password GUI (apt, Linux-Desktop only)
      ansible.builtin.apt:
        name: 1password
        state: present
        update_cache: true
      become: true
      when: rl_context == 'linux'

    - name: Install 1Password GUI (dnf, Fedora)
      ansible.builtin.dnf:
        name: 1password
        state: present
      become: true
      when: rl_context == 'fedora'
