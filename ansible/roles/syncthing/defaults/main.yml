---
# Syncthing role defaults.
# The role is triggered by "'personal' in host_profiles" in site.yml.

# Path to the Syncthing sync folder.
syncthing_folder_path: "{{ ansible_facts.env.HOME }}/Sync"

# Folder ID for the shared folder (must match on all devices sharing it).
syncthing_folder_id: sync-vault

# 1Password reference to the Synology device ID.
# Per-host value in machines.yml can override.
syncthing_synology_op_ref: "op://Private/Syncthing-Synology/device-id"

# Syncthing REST API endpoint.
syncthing_api_url: "http://127.0.0.1:8384"
