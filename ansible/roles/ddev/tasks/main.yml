---
# Install DDEV (primary local dev environment for TYPO3/Laravel).
# DDEV requires Docker (RL-10) and uses mkcert for local HTTPS certificates.
# Sources: https://ddev.readthedocs.io/en/stable/users/install/

# =============================================================================
# macOS: Auto-start OrbStack and wait for Docker (RL-28)
# =============================================================================
# On macOS, Docker = OrbStack. The cask installs the .app but the docker CLI
# and daemon only become available after OrbStack is started once. This block
# starts OrbStack headlessly and waits for the Docker socket before DDEV install.

- name: Start OrbStack and wait for Docker (macOS)
  when:
    - rl_os == 'macos'
    - not ansible_check_mode
  block:
    - name: Check if OrbStack is installed
      ansible.builtin.stat:
        path: /Applications/OrbStack.app
      register: orbstack_app

    - name: Start OrbStack headlessly
      ansible.builtin.command:
        cmd: open -ga OrbStack
      check_mode: false
      changed_when: false
      when: orbstack_app.stat.exists | default(false)

    - name: Wait for Docker socket to become available
      ansible.builtin.wait_for:
        # TODO: verify OrbStack socket path on target Mac
        # OrbStack typically creates ~/.orbstack/run/docker.sock or symlinks
        # /var/run/docker.sock. Using the user-space socket for robustness.
        path: "{{ ansible_facts.env.HOME }}/.orbstack/run/docker.sock"
        state: present
        timeout: 90
      failed_when: false
      when: orbstack_app.stat.exists | default(false)

# =============================================================================
# Pre-Flight: Docker must be available
# =============================================================================

- name: Check if Docker is available
  ansible.builtin.command: docker --version
  register: docker_check
  check_mode: false
  changed_when: false
  failed_when: false

- name: Note if Docker is not available (DDEV install skipped)
  ansible.builtin.debug:
    msg: >-
      Docker is not available yet — skipping DDEV. On macOS launch OrbStack once
      (it provides the `docker` CLI + daemon); on Linux/WSL start the docker
      service (see RL-10). Then re-run provisioning to install DDEV.
  when:
    - not ansible_check_mode
    - docker_check.rc != 0

# =============================================================================
# DDEV Installation (only when Docker is available)
# =============================================================================

- name: Install DDEV
  when:
    - ddev_install | bool
    - docker_check.rc == 0
  block:
    # --- macOS ---
    - name: Add DDEV Homebrew tap (macOS)
      community.general.homebrew_tap:
        name: ddev/ddev
        state: present
      when: rl_os == 'macos'

    # Homebrew >= 5.1.15 refuses to load formulae from non-official ("untrusted")
    # taps unless trusted; enforced from Homebrew 6.0. Trust the ddev tap before
    # install. Tolerant: older Homebrew has no `brew trust` subcommand and does
    # not enforce trust, so a failure here is harmless and must not block install.
    - name: Trust the DDEV Homebrew tap (macOS)
      ansible.builtin.command:
        cmd: brew trust ddev/ddev
      register: ddev_brew_trust
      check_mode: false
      changed_when: false
      failed_when: false
      when: rl_os == 'macos'

    - name: Install DDEV (macOS)
      community.general.homebrew:
        name: ddev
        state: present
      when: rl_os == 'macos'

    # --- Debian/Ubuntu/WSL ---
    - name: Ensure apt keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      become: true
      when: rl_context in ['wsl', 'linux']

    - name: Add DDEV signing key (apt)
      ansible.builtin.get_url:
        url: https://pkg.ddev.com/apt/gpg.key
        dest: /etc/apt/keyrings/ddev.asc
        mode: "0644"
      become: true
      when: rl_context in ['wsl', 'linux']

    - name: Add DDEV apt repository
      ansible.builtin.deb822_repository:
        name: ddev
        types: [deb]
        uris: ["https://pkg.ddev.com/apt/"]
        suites: ["*"]
        components: ["*"]
        signed_by: /etc/apt/keyrings/ddev.asc
        state: present
      become: true
      when: rl_context in ['wsl', 'linux']

    - name: Install DDEV (apt)
      ansible.builtin.apt:
        name: ddev
        state: present
        update_cache: true
      become: true
      when: rl_context in ['wsl', 'linux']

    # --- Fedora ---
    # NOTE: DDEV yum repo is currently UNSIGNED. gpgcheck disabled intentionally.
    # Official DDEV docs: "Signed yum repository support will be added in the future."
    - name: Add DDEV dnf repository (Fedora)
      ansible.builtin.yum_repository:
        name: ddev
        description: DDEV Repository
        baseurl: https://pkg.ddev.com/yum/
        enabled: true
        gpgcheck: false
      become: true
      when: rl_context == 'fedora'

    - name: Install DDEV (dnf)
      ansible.builtin.dnf:
        name: ddev
        state: present
      become: true
      when: rl_context == 'fedora'

# =============================================================================
# mkcert Installation (for trusted local HTTPS certificates)
# =============================================================================

- name: Install mkcert
  when: ddev_install_mkcert | bool
  block:
    # --- macOS ---
    - name: Install mkcert (macOS)
      community.general.homebrew:
        name: mkcert
        state: present
      when: rl_os == 'macos'

    # --- Debian/Ubuntu/WSL ---
    # NOTE: mkcert availability in apt varies by distro/version. Ubuntu 22.04+ has it
    # in universe. If not available, manual binary install is needed (see DDEV docs).
    - name: Install mkcert and libnss3-tools (apt)
      ansible.builtin.apt:
        name:
          - mkcert
          - libnss3-tools
        state: present
      become: true
      when: rl_context in ['wsl', 'linux']

    # --- Fedora ---
    - name: Install mkcert and nss-tools (dnf)
      ansible.builtin.dnf:
        name:
          - mkcert
          - nss-tools
        state: present
      become: true
      when: rl_context == 'fedora'

# =============================================================================
# mkcert -install (register local CA in system trust store)
# =============================================================================

- name: Configure mkcert CA
  when:
    - ddev_install_mkcert | bool
    - ddev_run_mkcert_install | bool
  block:
    - name: Get mkcert CAROOT path
      ansible.builtin.command: mkcert -CAROOT
      register: mkcert_caroot
      check_mode: false
      changed_when: false
      failed_when: false

    - name: Check if mkcert CA is already installed
      ansible.builtin.stat:
        path: "{{ mkcert_caroot.stdout | default('') }}/rootCA.pem"
      register: mkcert_ca_file
      when: mkcert_caroot.rc == 0

    - name: Install mkcert CA to system trust store
      ansible.builtin.command: mkcert -install
      register: mkcert_install_result
      changed_when: "'The local CA is now installed' in mkcert_install_result.stdout or 'Created a new local CA' in mkcert_install_result.stdout"
      when:
        - not ansible_check_mode
        - mkcert_caroot.rc == 0
        - not (mkcert_ca_file.stat.exists | default(false))
