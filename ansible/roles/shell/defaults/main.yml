---
# shell role defaults. Override per profile in the config repo if desired.
shell_default: zsh                 # login shell to set
shell_install_omz: true            # oh-my-zsh framework
shell_install_p10k: true           # powerlevel10k prompt
shell_install_plugins: true        # zsh-autosuggestions + zsh-syntax-highlighting
shell_set_default: true            # chsh to shell_default

# NOTE: Nerd Fonts are now installed via the dedicated 'fonts' role.
# The shell role no longer handles font installation.
