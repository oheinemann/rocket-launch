---
# Apply dotfiles with chezmoi from the config repo's dotfiles/ source.
# Secrets are pulled from 1Password via op:// references at apply time.

- name: Check chezmoi availability
  ansible.builtin.command: chezmoi --version
  register: chezmoi_check
  changed_when: false
  failed_when: false

- name: Skip dotfiles if chezmoi missing
  ansible.builtin.debug:
    msg: "chezmoi not found — skipping dotfiles. Re-run 'rocket bootstrap'."
  when: chezmoi_check.rc != 0

- name: Set dotfiles source path
  ansible.builtin.set_fact:
    chezmoi_source: "{{ rl_config_home }}/dotfiles"

- name: Block — configure & apply chezmoi
  when:
    - chezmoi_check.rc == 0
    - chezmoi_source is exists
  block:
    - name: Ensure chezmoi config dir
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.config/chezmoi"
        state: directory
        mode: "0700"

    - name: Write chezmoi config (sourceDir + 1Password)
      ansible.builtin.template:
        src: chezmoi.toml.j2
        dest: "{{ ansible_env.HOME }}/.config/chezmoi/chezmoi.toml"
        mode: "0600"

    - name: Check 1Password CLI signed-in state (best effort)
      ansible.builtin.command: op whoami
      register: op_status
      changed_when: false
      failed_when: false

    - name: Warn if op:// references may fail
      ansible.builtin.debug:
        msg: >-
          op CLI not signed in — dotfiles using op:// references may fail.
          Run 'eval $(op signin)' and re-run 'rocket provision'.
      when: op_status.rc != 0

    - name: Apply dotfiles with chezmoi
      ansible.builtin.command:
        cmd: "chezmoi apply --source {{ chezmoi_source }} --no-tty"
      register: chezmoi_apply
      changed_when: chezmoi_apply.stdout | length > 0
