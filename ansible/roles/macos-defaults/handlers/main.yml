---
# Handlers to restart UI services after defaults changes.
# Only triggered when osx_defaults actually changes a value.

- name: Restart Dock
  ansible.builtin.command: killall Dock
  changed_when: false
  failed_when: false

- name: Restart Finder
  ansible.builtin.command: killall Finder
  changed_when: false
  failed_when: false

- name: Restart SystemUIServer
  ansible.builtin.command: killall SystemUIServer
  changed_when: false
  failed_when: false
