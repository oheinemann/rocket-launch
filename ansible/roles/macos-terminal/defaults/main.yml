---
# macos-terminal role defaults. macOS only; runs after the fonts role.

# Font used by the terminals. Display family name — iTerm2 accepts it and parses
# the trailing token as the size. Authoritative value is set in site.yml vars; this
# is the standalone fallback. Override with a PostScript name if a terminal is picky.
terminal_font: "FiraCode Nerd Font"
terminal_font_size: 14

# Terminal.app profile to import. The font is a binary NSFont blob that cannot be
# generated off-Mac, so ship a user-exported .terminal here. Empty/missing = skip.
terminal_app_profile_file: "{{ rl_config_home | default('') }}/macos/Terminal.terminal"
terminal_app_profile_name: "rocket-launch"
