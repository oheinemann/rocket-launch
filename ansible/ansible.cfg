[defaults]
inventory = ./inventory/local.yml
roles_path = ./roles
# The 'yaml' callback plugin was removed in community.general >= 12; use the
# built-in default callback with YAML-formatted task results instead.
stdout_callback = default
result_format = yaml
nocows = true
interpreter_python = auto_silent
retry_files_enabled = false

[privilege_escalation]
become = false
become_ask_pass = false
