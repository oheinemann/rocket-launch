---
# Package map — resolves a *logical* app name to the right manager + id per OS.
#
# managers:
#   macos   : brew | brew-cask | mas
#   linux   : apt (Ubuntu/WSL) | dnf (Fedora) | flatpak
#
# Profiles in the config repo reference only the logical keys below.
# Extend freely; unknown keys are reported and skipped during provisioning.

git:
  macos: { mgr: brew, id: git }
  apt:   { mgr: apt,  id: git }
  dnf:   { mgr: dnf,  id: git }

ripgrep:
  macos: { mgr: brew, id: ripgrep }
  apt:   { mgr: apt,  id: ripgrep }
  dnf:   { mgr: dnf,  id: ripgrep }

fzf:
  macos: { mgr: brew, id: fzf }
  apt:   { mgr: apt,  id: fzf }
  dnf:   { mgr: dnf,  id: fzf }

neovim:
  macos: { mgr: brew, id: neovim }
  apt:   { mgr: apt,  id: neovim }
  dnf:   { mgr: dnf,  id: neovim }

# docker: on macOS -> OrbStack (brew-cask); on Linux/WSL -> docker-ce role (RL-10).
# No apt/dnf mapping here — the docker-ce role handles the official Docker repo
# to avoid conflicts with apt docker.io / dnf docker (containerd.io issue).
docker:
  macos: { mgr: brew-cask, id: orbstack }

vscode:
  macos: { mgr: brew-cask, id: visual-studio-code }
  apt:   { mgr: apt,       id: code }
  dnf:   { mgr: dnf,       id: code }

slack:
  macos: { mgr: brew-cask, id: slack }
  dnf:   { mgr: flatpak,   id: com.slack.Slack }
  # On WSL, Slack lives on the Windows host (see config windows-host.txt).

teams:
  # Microsoft Teams — macOS + Windows only. No native Linux client (discontinued).
  macos: { mgr: brew-cask, id: microsoft-teams }
  # On Windows host: winget Microsoft.Teams (see config windows-host.txt).
  # Kept in the packages role-managed ignore list so it is not flagged on Linux.

claude:
  # Claude Desktop — GUI app, macOS + Windows only. No official Linux package.
  macos: { mgr: brew-cask, id: claude }
  # On Windows host: winget Anthropic.Claude (see config windows-host.txt).

obsidian:
  macos: { mgr: brew-cask, id: obsidian }
  dnf:   { mgr: flatpak,   id: md.obsidian.Obsidian }
  # On WSL, Obsidian lives on the Windows host (see config windows-host.txt).

firefox:
  macos: { mgr: brew-cask, id: firefox }
  dnf:   { mgr: flatpak,   id: org.mozilla.firefox }
  # On WSL, Firefox lives on the Windows host (see config windows-host.txt).

chrome:
  macos: { mgr: brew-cask, id: google-chrome }
  dnf:   { mgr: flatpak,   id: com.google.Chrome }
  # On WSL, Chrome lives on the Windows host (see config windows-host.txt).
  # Note: com.google.Chrome may require the flathub-beta remote on some setups;
  # fallback is Googles official dnf repo (future ticket if Flathub stable lacks it).

brave:
  macos: { mgr: brew-cask, id: brave-browser }
  dnf:   { mgr: flatpak,   id: com.brave.Browser }
  # On WSL, Brave lives on the Windows host (see config windows-host.txt).

postman:
  macos: { mgr: brew-cask, id: postman }
  dnf:   { mgr: flatpak,   id: com.getpostman.Postman }
  # On WSL, Postman lives on the Windows host (see config windows-host.txt).

iterm2:
  macos: { mgr: brew-cask, id: iterm2 }
  # macOS only — no Linux equivalent (Terminal / Konsole are sufficient).

spark:
  # Spark Mail — GUI app, macOS + Windows only. No official Linux package.
  macos: { mgr: brew-cask, id: readdle-spark }
  # On Windows host: winget Readdle.Spark (see config windows-host.txt).

# --- Mac App Store (mas) ---
# App Store apps use the `mas` manager with the numeric App Store id. The engine
# installs mas-cli on demand; you must be signed into the App Store and the app
# must already be associated with your Apple ID. Find ids with `mas search <name>`.
# Example (uncomment + verify the id, then reference the key from a profile):
# amphetamine:
#   macos: { mgr: mas, id: 937984704 }   # verify: `mas search Amphetamine`
